name: Build and push Docker images

on:
  push:
    branches: [main]
    paths:
      - ldoce5-api/**
      - anki-writer/**

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-ldoce5-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ldoce5-api
        uses: docker/build-push-action@v5
        with:
          context: ldoce5-api
          file: ldoce5-api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/ldoce5-api:latest
          cache-from: type=gha,scope=ldoce5-api
          cache-to: type=gha,mode=max,scope=ldoce5-api

  build-anki-writer:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push anki-writer
        uses: docker/build-push-action@v5
        with:
          context: anki-writer
          file: anki-writer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/anki-writer:latest
          cache-from: type=gha,scope=anki-writer
          cache-to: type=gha,mode=max,scope=anki-writer
